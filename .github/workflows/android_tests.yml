name: Android DevSecOps Pipeline
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-static-analysis:
    name: Build, Unit Tests & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # --- FAZA BEZPIECZEŃSTWA (SAST) ---
      - name: Run MobSF Static Analysis (mobsfscan)
        uses: MobSF/mobsfscan-action@main
        with:
          args: . --sarif --output mobsf-results.sarif

      - name: Upload MobSF Report
        uses: actions/upload-artifact@v4
        with:
          name: mobsf-security-report
          path: mobsf-results.sarif

      # --- COMPILATION & UNIT TESTS ---
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

  instrumented-tests:
    name: Emulator UI Tests
    runs-on: ubuntu-latest
    needs: build-and-static-analysis
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Enable KVM for Android Emulator
        run: |
          echo "Verifying hardware virtualization support"
          egrep -c '(vmx|svm)' /proc/cpuinfo || true
      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_6
          script: ./gradlew connectedDebugAndroidTest --stacktrace
